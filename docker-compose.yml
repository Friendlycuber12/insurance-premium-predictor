services:
  backend:
    build: .
    container_name: insurance-premium-backend
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build: .
    container_name: insurance-premium-frontend
    command: streamlit run frontend.py --server.address 0.0.0.0 --server.port 8501
    environment:
      API_URL: http://backend:8000/predict
    ports:
      - "8501:8501"
    depends_on:
      - backend
